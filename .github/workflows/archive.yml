name: Archive Website

on:
  schedule:
    # 11:30 PM IST
    - cron: "0 18 * * *"

    # 12:30 AM IST
    - cron: "0 19 * * *"

    # 1:30 AM IST
    - cron: "0 20 * * *"

  workflow_dispatch:

jobs:
  archive:
    runs-on: ubuntu-latest

    steps:
      - name: Save page to Wayback Machine
        run: |
          curl -I "https://web.archive.org/save/https://icarcounseling.com/"
